services:
  mongo:
    image: mongo:7
    container_name: taskdo-mongo
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/taskdo --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskdo-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./server
    container_name: taskdo-backend
    restart: unless-stopped
    ports: ["3001:3001"]
    env_file:
      - ./server/.env
    environment:
      FRONTEND_URL: http://localhost
      INTERNAL_MONGO_URI: mongodb://mongo:27017/taskdo
      INTERNAL_REDIS_URL: redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD","wget","--quiet","--tries=1","--spider","http://127.0.0.1:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: /api
    container_name: taskdo-frontend
    restart: unless-stopped
    ports: ["80:80"]
    depends_on:
      backend: { condition: service_healthy }

volumes:
  mongo_data:
